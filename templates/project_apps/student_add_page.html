{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("{% static 'apps/img/img_1.png' %}"); /* static image */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        form {
            background: rgba(255, 255, 255, 0.95); /* biroz shaffof qilish, fon rasm bilan kontrast */
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        form label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        form input, form select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            background-color: #2196F3;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }

        .back-btn:hover {
            background-color: #1976D2;
        }
    </style>
</head>
<body>

<h1>Add New Student</h1>

<form method="POST" action="{% url 'student_add' %}">
    {% csrf_token %}

    <label for="first_name">First Name:</label>
    <input type="text" id="first_name" name="first_name" required>

    <label for="last_name">Last Name:</label>
    <input type="text" id="last_name" name="last_name" required>

    <label for="phone">Phone:</label>
    <input type="text" id="phone" name="phone" required>

    <label for="birth_date">Birth Date:</label>
    <input type="date" id="birth_date" name="birth_date" required>

    <label for="university">University:</label>
    <select id="university" name="university" required>
        {% for uni in universities %}
            <option value="{{ uni.id }}">{{ uni.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add Student</button>
    <a href="{% url 'student_list_page' %}" class="back-btn">Back to List</a>
</form>


</body>
</html>
